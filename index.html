<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="author" content="Kishore Kumar Maistry">
<title>Dealer Margin Calculator</title>
<style>
  :root {
    --primary: #007aff;
    --primary-hover: #0056b3;
    --bg-main: #f5f5f7;
    --bg-card: #ffffff;
    --text-main: #1d1d1f;
    --text-muted: #86868b;
    --border-color: #d2d2d7;
    --success: #34c759;
    --danger: #ff3b30;
    --a-site-bg: #f0f8ff;
    --b-site-bg: #f2fce8;
  }

  body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
    color: var(--text-main); 
    background-color: var(--bg-main); 
    margin: 0; 
    padding: 20px 15px; 
    -webkit-font-smoothing: antialiased;
  }

  .container { 
    margin: 0 auto; 
    width: 100%; 
    max-width: 680px; 
  }

  .card { 
    background-color: var(--bg-card); 
    padding: 30px; 
    border-radius: 18px; 
    box-shadow: 0 4px 24px rgba(0,0,0,0.04); 
    margin-bottom: 20px;
  }
  
  .header-actions { 
    position: relative; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    margin-bottom: 20px; 
  }
  
  .app-title { 
    font-size: 22px; 
    font-weight: 700; 
    margin: 0; 
    letter-spacing: -0.5px; 
    text-align: center;
  }
  
  .lang-btn { 
    position: absolute;
    right: 0;
    background-color: transparent; 
    color: var(--primary); 
    border: 1px solid var(--primary); 
    border-radius: 14px; 
    padding: 6px 14px; 
    font-size: 13px; 
    font-weight: 600; 
    cursor: pointer; 
    transition: 0.2s; 
  }
  .lang-btn:hover { background-color: var(--primary); color: #fff; }

  p.instruction { font-size: 14px; color: var(--text-muted); margin-top: 0; margin-bottom: 24px; line-height: 1.5; text-align: center; }

  .fuel-section { margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--border-color); }
  .fuel-section:last-of-type { border-bottom: none; padding-bottom: 0; }
  
  .section-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; color: var(--text-main); }
  
  .input-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  
  @media (max-width: 500px) {
      .input-grid { grid-template-columns: 1fr; }
  }

  .input-group { display: flex; flex-direction: column; gap: 6px; }
  
  label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; line-height: 1.2; }
  .optional-tag { font-weight: 400; text-transform: none; color: #a1a1a6; font-size: 10px; display: block; }
  
  input[type="number"] { 
    width: 100%; 
    padding: 12px; 
    font-size: 16px; 
    border: 1px solid var(--border-color); 
    border-radius: 10px; 
    background-color: #fafafa; 
    box-sizing: border-box; 
    transition: border-color 0.2s, background-color 0.2s;
  }
  input[type="number"]:focus { outline: none; border-color: var(--primary); background-color: #fff; }
  input[type="number"]::placeholder { color: #c7c7cc; }

  .calc-btn { 
    width: 100%; 
    background-color: var(--primary); 
    color: #ffffff; 
    font-size: 16px; 
    font-weight: 600; 
    padding: 16px; 
    border: none; 
    border-radius: 12px; 
    cursor: pointer; 
    transition: transform 0.1s, background-color 0.2s; 
  }
  .calc-btn:active { transform: scale(0.98); }
  .calc-btn:hover { background-color: var(--primary-hover); }

  .result-wrapper { margin-top: 24px; overflow-x: auto; }
  table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color); background-color: #fff; }
  th, td { padding: 12px 14px; text-align: right; border-bottom: 1px solid var(--border-color); }
  th:first-child, td:first-child { text-align: left; }
  th { background-color: #fafafa; font-weight: 600; font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid var(--border-color); }
  tr:last-child td { border-bottom: none; }
  
  .site-a-col { background-color: var(--a-site-bg); }
  .site-b-col { background-color: var(--b-site-bg); }
  
  .row-title { font-weight: 600; color: var(--text-main); }
  .text-danger { color: var(--danger); }
  .text-success { color: var(--success); }
  .text-info { color: var(--primary); }
  .final-row td { font-size: 15px; font-weight: 700; background-color: #fafafa; }
  
  .slab-table { margin-top: 24px; font-size: 12px; }
  .slab-table th { background-color: #f5f5f7; border-bottom: 1px solid var(--border-color); text-transform: none; }
  .slab-table tr:nth-child(even) td { background-color: #fafafa; }
  
  .footer-links { text-align: center; margin-top: 20px; }
  .footer-links a, .footer-links button { 
    display: inline-block; 
    background: none; 
    border: none; 
    color: var(--text-muted); 
    font-size: 13px; 
    text-decoration: none; 
    cursor: pointer; 
    margin: 0 10px; 
  }
  .footer-links a:hover, .footer-links button:hover { color: var(--text-main); }

  @media print {
    body { background-color: #fff; padding: 0; }
    .card { box-shadow: none; border: none; padding: 0; margin: 0; }
    .no-print { display: none !important; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="card no-print">
    <div class="header-actions">
      <h1 class="app-title" id="appTitle">Dealer Margin Calculator</h1>
      <button id="langToggle" class="lang-btn" onclick="switchLanguage()">తెలుగు</button>
    </div>
    
    <p class="instruction" id="appInstruction">Enter prices to find your base net margin. Add your previous month's volume to calculate your exact final margin including protection and dynamic incentives.</p>
    
    <div class="fuel-section">
      <div class="section-title" id="lblPetrol">🚗 Petrol (MS)</div>
      <div class="input-grid">
        <div class="input-group">
          <label id="lblMsRsp">Selling Price (RSP)</label>
          <input type="number" id="msRsp" placeholder="e.g. 109.91" step="0.01">
        </div>
        <div class="input-group">
          <label id="lblMsInv">Invoice Price</label>
          <input type="number" id="msInvoice" placeholder="e.g. 105.85" step="0.01">
        </div>
        <div class="input-group">
          <label id="lblMsVol">Prev. Vol (KL) <span class="optional-tag">- Optional</span></label>
          <input type="number" id="msVol" placeholder="e.g. 20" step="1">
        </div>
      </div>
    </div>
    
    <div class="fuel-section">
      <div class="section-title" id="lblDiesel">🚛 Diesel (HSD)</div>
      <div class="input-grid">
        <div class="input-group">
          <label id="lblHsdRsp">Selling Price (RSP)</label>
          <input type="number" id="hsdRsp" placeholder="e.g. 97.73" step="0.01">
        </div>
        <div class="input-group">
          <label id="lblHsdInv">Invoice Price</label>
          <input type="number" id="hsdInvoice" placeholder="e.g. 95.14" step="0.01">
        </div>
        <div class="input-group">
          <label id="lblHsdVol">Prev. Vol (KL) <span class="optional-tag">- Optional</span></label>
          <input type="number" id="hsdVol" placeholder="e.g. 120" step="1">
        </div>
      </div>
    </div>
    
    <button id="btnCalculate" class="calc-btn" onclick="calculateMargin()">Calculate Margin</button>
  </div>

  <div id="result-container"></div>
  
  <div class="footer-links no-print">
    <button id="btnPrint" style="display: none;" onclick="window.print()">🖨️ Print Report</button>
    <a href="mailto:kishore.kumar.m@live.com?subject=Dealer Margin Calculator">✉️ Report Issue</a>
  </div>
</div>

<script>
const i18n = {
  en: {
    appTitle: "Dealer Margin Calculator",
    appInstruction: "Enter prices to find your base net margin. Add your previous month's volume to calculate your exact final margin including protection and dynamic incentives.",
    lblPetrol: "🚗 Petrol (MS)",
    lblDiesel: "🚛 Diesel (HSD)",
    lblRsp: "Selling Price (RSP)",
    lblInv: "Invoice Price",
    lblVol: "Prev. Vol (KL) <span class='optional-tag'>- Optional</span>",
    btnCalc: "Calculate Margin",
    colDetails: "Breakdown Per Liter",
    colASite: "A-Site",
    colBSite: "B-Site",
    txtGross: "Base Profit (RSP - Inv)",
    txtLfr: "OMC LFR Deduction",
    txtNet: "Invoice Net Margin",
    txtProt: "Margin Protection Shortfall",
    txtBr: "Business Return (Shortfall)",
    txtMp: "Manpower Return",
    txtFinal: "Final Total Margin",
    msgNoVol: "Volume not provided. Showing guaranteed base return.",
    msgVol: "Dynamic returns & protection added based on combined volume of",
    lblSlabTitle: "Reference: Margin Slabs & Fixed Rates",
    txtEnterVol: "Enter Vol"
  },
  te: {
    appTitle: "డీలర్ మార్జిన్ కాలిక్యులేటర్",
    appInstruction: "మీ నెట్ మార్జిన్ తెలుసుకోవడానికి ధరలను నమోదు చేయండి. డైనమిక్ ఇన్సెంటివ్‌లతో సహా మీ ఖచ్చితమైన తుది మార్జిన్‌ను లెక్కించడానికి, గత నెల వాల్యూమ్‌ను కూడా నమోదు చేయండి (ఇది ఐచ్ఛికం).",
    lblPetrol: "🚗 పెట్రోల్ (MS)",
    lblDiesel: "🚛 డీజిల్ (HSD)",
    lblRsp: "అమ్మకపు ధర (RSP)",
    lblInv: "ఇన్వాయిస్ ధర",
    lblVol: "గత నెల వాల్యూమ్ (KL) <span class='optional-tag'>- ఐచ్ఛికం</span>",
    btnCalc: "మార్జిన్ లెక్కించు",
    colDetails: "లీటరుకు వివరాలు",
    colASite: "A-సైట్",
    colBSite: "B-సైట్",
    txtGross: "సాధారణ లాభం (RSP - Inv)",
    txtLfr: "LFR తగ్గింపు",
    txtNet: "ఇన్వాయిస్ నెట్ మార్జిన్",
    txtProt: "మార్జిన్ ప్రొటెక్షన్ షార్ట్‌ఫాల్",
    txtBr: "బిజినెస్ రిటర్న్ (షార్ట్‌ఫాల్)",
    txtMp: "మ్యాన్‌పవర్ రిటర్న్",
    txtFinal: "తుది మార్జిన్",
    msgNoVol: "వాల్యూమ్ ఇవ్వబడలేదు. బేస్ రిటర్న్ మాత్రమే చూపబడింది.",
    msgVol: "మొత్తం వాల్యూమ్ ఆధారంగా డైనమిక్ రిటర్న్ & ప్రొటెక్షన్ జోడించబడింది:",
    lblSlabTitle: "రిఫరెన్స్: మార్జిన్ స్లాబ్‌లు మరియు ఫిక్స్‌డ్ రేట్లు",
    txtEnterVol: "వాల్యూమ్ ఇవ్వండి"
  }
};

let currentLang = 'en';

function switchLanguage() {
  currentLang = currentLang === 'en' ? 'te' : 'en';
  const t = i18n[currentLang];
  
  document.getElementById('langToggle').innerText = currentLang === 'en' ? 'తెలుగు' : 'English';
  document.getElementById('appTitle').innerText = t.appTitle;
  document.getElementById('appInstruction').innerText = t.appInstruction;
  document.getElementById('lblPetrol').innerText = t.lblPetrol;
  document.getElementById('lblDiesel').innerText = t.lblDiesel;
  
  document.querySelectorAll('#lblMsRsp, #lblHsdRsp').forEach(el => el.innerHTML = t.lblRsp);
  document.querySelectorAll('#lblMsInv, #lblHsdInv').forEach(el => el.innerHTML = t.lblInv);
  document.querySelectorAll('#lblMsVol, #lblHsdVol').forEach(el => el.innerHTML = t.lblVol);
  
  document.getElementById('btnCalculate').innerText = t.btnCalc;
  
  if (document.getElementById("result-container").innerHTML !== "") {
    calculateMargin();
  }
}

function calculateMargin() {
  let msRsp = parseFloat(document.getElementById('msRsp').value) || 0;
  let msInv = parseFloat(document.getElementById('msInvoice').value) || 0;
  let msVol = parseFloat(document.getElementById('msVol').value) || 0;
  
  let hsdRsp = parseFloat(document.getElementById('hsdRsp').value) || 0;
  let hsdInv = parseFloat(document.getElementById('hsdInvoice').value) || 0;
  let hsdVol = parseFloat(document.getElementById('hsdVol').value) || 0;

  let totalVol = msVol + hsdVol;
  let hasVolume = totalVol > 0;

  const lfrA_ms = (443.50 * 1.18) / 1000;
  const lfrA_hsd = (369.58 * 1.18) / 1000;
  const lfrB_ms = (235.96 * 1.28) / 1000;
  const lfrB_hsd = (196.65 * 1.28) / 1000;

  let diffMs = msRsp - msInv;
  let diffHsd = hsdRsp - hsdInv;
  
  let netDmA_ms = diffMs - lfrA_ms;
  let netDmB_ms = diffMs - lfrB_ms;
  let netDmA_hsd = diffHsd - lfrA_hsd;
  let netDmB_hsd = diffHsd - lfrB_hsd;

  // OMC Protected Rates per liter
  const protectedMS = 2472.97 / 1000;
  const protectedHSD = 1881.92 / 1000;

  let br_ms_shortfall_pl = 0;
  let br_hsd_shortfall_pl = 0;
  let mp_ms_pl = 0;
  let mp_hsd_pl = 0;
  
  let protA_ms_pl = 0;
  let protB_ms_pl = 0;
  let protA_hsd_pl = 0;
  let protB_hsd_pl = 0;

  if (hasVolume) {
    // 1. Business Return
    const baseMS = msVol * 201.76;
    const baseHSD = hsdVol * 149.46;
    const baseTotal = baseMS + baseHSD;
    let totalBR = baseTotal;

    if (totalVol <= 25) totalBR = Math.max(12000, baseTotal);
    else if (totalVol <= 50) totalBR = Math.max(20000, baseTotal);
    else if (totalVol <= 100) totalBR = Math.max(24000, baseTotal);
    else if (totalVol <= 150) totalBR = Math.max(26000, baseTotal);
    else if (totalVol <= 170) totalBR = Math.max(27500, baseTotal);

    let br_shortfall = totalBR - baseTotal;
    if (br_shortfall > 0 && baseTotal > 0) {
        let br_ms_total_shortfall = br_shortfall * (baseMS / baseTotal);
        let br_hsd_total_shortfall = br_shortfall * (baseHSD / baseTotal);
        if (msVol > 0) br_ms_shortfall_pl = br_ms_total_shortfall / (msVol * 1000);
        if (hsdVol > 0) br_hsd_shortfall_pl = br_hsd_total_shortfall / (hsdVol * 1000);
    }

    // 2. Manpower
    let slab_ms = 0, slab_hsd = 0;
    const slabs = [
      { limit: 400, ms: 379.67, hsd: 281.23 }, { limit: 600, ms: 340.19, hsd: 251.99 },
      { limit: 800, ms: 300.72, hsd: 222.75 }, { limit: 1000, ms: 261.24, hsd: 193.51 },
      { limit: 1200, ms: 221.77, hsd: 164.27 }, { limit: 1400, ms: 182.29, hsd: 135.03 },
      { limit: 1600, ms: 142.82, hsd: 105.79 }, { limit: 1800, ms: 103.34, hsd: 76.55 },
      { limit: 2000, ms: 78.95, hsd: 58.48 }, { limit: 2200, ms: 52.63, hsd: 38.99 },
      { limit: 2400, ms: 39.47, hsd: 29.24 }, { limit: 2600, ms: 26.32, hsd: 19.49 },
      { limit: 2800, ms: 13.16, hsd: 9.75 }, { limit: Infinity, ms: 0, hsd: 0 }
    ];

    for (let slab of slabs) {
      if (totalVol <= slab.limit) { slab_ms = slab.ms; slab_hsd = slab.hsd; break; }
    }

    mp_ms_pl = slab_ms / 1000;
    mp_hsd_pl = slab_hsd / 1000;
    
    // 3. Margin Protection Shortfall (Only applies if actual invoice margin is less than protected fixed margin)
    protA_ms_pl = Math.max(0, protectedMS - netDmA_ms);
    protB_ms_pl = Math.max(0, protectedMS - netDmB_ms);
    
    protA_hsd_pl = Math.max(0, protectedHSD - netDmA_hsd);
    protB_hsd_pl = Math.max(0, protectedHSD - netDmB_hsd);
  }

  function fmt(num) {
    return (num < 0 ? "-" : "") + "₹" + Math.abs(num).toFixed(4);
  }

  const t = i18n[currentLang];
  const volMsg = hasVolume ? `${t.msgVol} <b>${totalVol} KL</b>` : t.msgNoVol;

  let mpDisplayMS = hasVolume ? `<span class="text-success">+${fmt(mp_ms_pl).replace('-','')}</span>` : `<span style="color: #a1a1a6; font-size: 11px; font-weight: normal;">${t.txtEnterVol}</span>`;
  let mpDisplayHSD = hasVolume ? `<span class="text-success">+${fmt(mp_hsd_pl).replace('-','')}</span>` : `<span style="color: #a1a1a6; font-size: 11px; font-weight: normal;">${t.txtEnterVol}</span>`;

  let brDisplayMS = hasVolume ? `<span class="text-success">+${fmt(br_ms_shortfall_pl).replace('-','')}</span>` : `<span style="color: #a1a1a6; font-size: 11px; font-weight: normal;">${t.txtEnterVol}</span>`;
  let brDisplayHSD = hasVolume ? `<span class="text-success">+${fmt(br_hsd_shortfall_pl).replace('-','')}</span>` : `<span style="color: #a1a1a6; font-size: 11px; font-weight: normal;">${t.txtEnterVol}</span>`;
  
  let protA_ms_display = hasVolume ? `<span class="text-info">+${fmt(protA_ms_pl).replace('-','')}</span>` : `<span style="color: #a1a1a6; font-size: 11px; font-weight: normal;">${t.txtEnterVol}</span>`;
  let protB_ms_display = hasVolume ? `<span class="text-info">+${fmt(protB_ms_pl).replace('-','')}</span>` : `<span style="color: #a1a1a6; font-size: 11px; font-weight: normal;">${t.txtEnterVol}</span>`;
  
  let protA_hsd_display = hasVolume ? `<span class="text-info">+${fmt(protA_hsd_pl).replace('-','')}</span>` : `<span style="color: #a1a1a6; font-size: 11px; font-weight: normal;">${t.txtEnterVol}</span>`;
  let protB_hsd_display = hasVolume ? `<span class="text-info">+${fmt(protB_hsd_pl).replace('-','')}</span>` : `<span style="color: #a1a1a6; font-size: 11px; font-weight: normal;">${t.txtEnterVol}</span>`;

  let html = `<div class="card result-wrapper">
    <p style="text-align: center; font-size: 13px; color: var(--text-muted); margin-top: 0; padding-bottom: 12px; border-bottom: 1px solid var(--border-color);">${volMsg}</p>
    <table style="border: none;">
      <tr>
        <th style="background: none; border-bottom: 2px solid var(--border-color);">${t.colDetails}</th>
        <th style="background: none; border-bottom: 2px solid var(--border-color); color: #0056b3;" class="site-a-col">${t.colASite}</th>
        <th style="background: none; border-bottom: 2px solid var(--border-color); color: #2d7a17;" class="site-b-col">${t.colBSite}</th>
      </tr>`;

  // MS Rows
  html += `<tr><td colspan="3" style="background: #fafafa; text-align: center; font-weight: 700;">🚗 MS (Petrol)</td></tr>`;
  html += `<tr><td class="row-title">${t.txtGross}</td><td>${fmt(diffMs)}</td><td>${fmt(diffMs)}</td></tr>`;
  html += `<tr><td class="row-title text-danger">${t.txtLfr}</td><td class="text-danger">-${fmt(lfrA_ms).replace('-','')}</td><td class="text-danger">-${fmt(lfrB_ms).replace('-','')}</td></tr>`;
  html += `<tr><td class="row-title">${t.txtNet}</td><td style="font-weight: 600;">${fmt(netDmA_ms)}</td><td style="font-weight: 600;">${fmt(netDmB_ms)}</td></tr>`;
  html += `<tr><td class="row-title text-info">${t.txtProt}</td><td>${protA_ms_display}</td><td>${protB_ms_display}</td></tr>`;
  html += `<tr><td class="row-title text-success">${t.txtMp}</td><td>${mpDisplayMS}</td><td>${mpDisplayMS}</td></tr>`;
  html += `<tr><td class="row-title text-success">${t.txtBr}</td><td>${brDisplayMS}</td><td>${brDisplayMS}</td></tr>`;
  html += `<tr class="final-row"><td class="row-title">${t.txtFinal}</td><td style="color: #0056b3;">${fmt(netDmA_ms + protA_ms_pl + mp_ms_pl + br_ms_shortfall_pl)}</td><td style="color: #2d7a17;">${fmt(netDmB_ms + protB_ms_pl + mp_ms_pl + br_ms_shortfall_pl)}</td></tr>`;

  // HSD Rows
  html += `<tr><td colspan="3" style="background: #fafafa; text-align: center; font-weight: 700; border-top: 4px solid var(--bg-main);">🚛 HSD (Diesel)</td></tr>`;
  html += `<tr><td class="row-title">${t.txtGross}</td><td>${fmt(diffHsd)}</td><td>${fmt(diffHsd)}</td></tr>`;
  html += `<tr><td class="row-title text-danger">${t.txtLfr}</td><td class="text-danger">-${fmt(lfrA_hsd).replace('-','')}</td><td class="text-danger">-${fmt(lfrB_hsd).replace('-','')}</td></tr>`;
  html += `<tr><td class="row-title">${t.txtNet}</td><td style="font-weight: 600;">${fmt(netDmA_hsd)}</td><td style="font-weight: 600;">${fmt(netDmB_hsd)}</td></tr>`;
  html += `<tr><td class="row-title text-info">${t.txtProt}</td><td>${protA_hsd_display}</td><td>${protB_hsd_display}</td></tr>`;
