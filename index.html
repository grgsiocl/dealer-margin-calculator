<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="author" content="Kishore Kumar Maistry">
<title>Dealer Margin Calculator</title>
<style>
  :root {
    --primary: #007aff;
    --primary-hover: #0056b3;
    --bg-main: #f5f5f7;
    --bg-card: #ffffff;
    --text-main: #1d1d1f;
    --text-muted: #86868b;
    --border-color: #d2d2d7;
    --success: #34c759;
    --danger: #ff3b30;
    --a-site-bg: #f0f8ff;
    --b-site-bg: #f2fce8;
  }

  body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
    color: var(--text-main); 
    background-color: var(--bg-main); 
    margin: 0; 
    padding: 20px 15px; 
    -webkit-font-smoothing: antialiased;
  }

  .container { 
    margin: 0 auto; 
    width: 100%; 
    max-width: 640px; 
  }

  .card { 
    background-color: var(--bg-card); 
    padding: 30px; 
    border-radius: 18px; 
    box-shadow: 0 4px 24px rgba(0,0,0,0.04); 
    margin-bottom: 20px;
  }
  
  /* Header & Toggle */
  .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .app-title { font-size: 22px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
  
  .lang-btn { 
    background-color: transparent; 
    color: var(--primary); 
    border: 1px solid var(--primary); 
    border-radius: 14px; 
    padding: 6px 14px; 
    font-size: 13px; 
    font-weight: 600; 
    cursor: pointer; 
    transition: 0.2s; 
  }
  .lang-btn:hover { background-color: var(--primary); color: #fff; }

  p.instruction { font-size: 14px; color: var(--text-muted); margin-top: 0; margin-bottom: 24px; line-height: 1.5; }

  /* Forms */
  .fuel-section { margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--border-color); }
  .fuel-section:last-of-type { border-bottom: none; padding-bottom: 0; }
  
  .section-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  
  .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
  .input-group { display: flex; flex-direction: column; gap: 6px; }
  
  label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .optional-tag { font-weight: 400; text-transform: none; color: #a1a1a6; font-size: 11px; }
  
  input[type="number"] { 
    width: 100%; 
    padding: 12px 14px; 
    font-size: 16px; 
    border: 1px solid var(--border-color); 
    border-radius: 10px; 
    background-color: #fafafa; 
    box-sizing: border-box; 
    transition: border-color 0.2s, background-color 0.2s;
  }
  input[type="number"]:focus { outline: none; border-color: var(--primary); background-color: #fff; }

  .calc-btn { 
    width: 100%; 
    background-color: var(--primary); 
    color: #ffffff; 
    font-size: 16px; 
    font-weight: 600; 
    padding: 16px; 
    border: none; 
    border-radius: 12px; 
    cursor: pointer; 
    transition: transform 0.1s, background-color 0.2s; 
  }
  .calc-btn:active { transform: scale(0.98); }
  .calc-btn:hover { background-color: var(--primary-hover); }

  /* Results Table */
  .result-wrapper { margin-top: 24px; overflow-x: auto; }
  table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 14px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color); }
  th, td { padding: 14px 16px; text-align: right; border-bottom: 1px solid var(--border-color); }
  th:first-child, td:first-child { text-align: left; }
  th { background-color: #fafafa; font-weight: 600; font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid var(--border-color); }
  tr:last-child td { border-bottom: none; }
  
  .site-a-col { background-color: var(--a-site-bg); }
  .site-b-col { background-color: var(--b-site-bg); }
  
  .row-title { font-weight: 600; color: var(--text-main); }
  .text-danger { color: var(--danger); }
  .text-success { color: var(--success); }
  .final-row td { font-size: 16px; font-weight: 700; background-color: #fafafa; }
  
  /* Static Slab Table */
  .slab-table { margin-top: 24px; font-size: 13px; }
  .slab-table th { background-color: #f5f5f7; border-bottom: 1px solid var(--border-color); }
  .slab-table tr:nth-child(even) td { background-color: #fafafa; }
  
  .footer-links { text-align: center; margin-top: 20px; }
  .footer-links a, .footer-links button { 
    display: inline-block; 
    background: none; 
    border: none; 
    color: var(--text-muted); 
    font-size: 13px; 
    text-decoration: none; 
    cursor: pointer; 
    margin: 0 10px; 
  }
  .footer-links a:hover, .footer-links button:hover { color: var(--text-main); }

  @media print {
    body { background-color: #fff; padding: 0; }
    .card { box-shadow: none; border: none; padding: 0; margin: 0; }
    .no-print { display: none !important; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="card no-print">
    <div class="header-actions">
      <h1 class="app-title" id="appTitle">Dealer Margin Calculator</h1>
      <button id="langToggle" class="lang-btn" onclick="switchLanguage()">తెలుగు</button>
    </div>
    
    <p class="instruction" id="appInstruction">Enter prices to find your base net margin. Optionally, add your previous month's volume to calculate your exact final margin including dynamic incentives.</p>
    
    <div class="fuel-section">
      <div class="section-title" id="lblPetrol">🚗 Petrol (MS)</div>
      <div class="input-grid">
        <div class="input-group">
          <label id="lblMsRsp">Selling Price (RSP)</label>
          <input type="number" id="msRsp" placeholder="0.00" step="0.01">
        </div>
        <div class="input-group">
          <label id="lblMsInv">Invoice Price</label>
          <input type="number" id="msInvoice" placeholder="0.00" step="0.01">
        </div>
        <div class="input-group">
          <label id="lblMsVol">Prev. Month Vol (KL) <span class="optional-tag">- Optional</span></label>
          <input type="number" id="msVol" placeholder="0" step="1">
        </div>
      </div>
    </div>
    
    <div class="fuel-section">
      <div class="section-title" id="lblDiesel">🚛 Diesel (HSD)</div>
      <div class="input-grid">
        <div class="input-group">
          <label id="lblHsdRsp">Selling Price (RSP)</label>
          <input type="number" id="hsdRsp" placeholder="0.00" step="0.01">
        </div>
        <div class="input-group">
          <label id="lblHsdInv">Invoice Price</label>
          <input type="number" id="hsdInvoice" placeholder="0.00" step="0.01">
        </div>
        <div class="input-group">
          <label id="lblHsdVol">Prev. Month Vol (KL) <span class="optional-tag">- Optional</span></label>
          <input type="number" id="hsdVol" placeholder="0" step="1">
        </div>
      </div>
    </div>
    
    <button id="btnCalculate" class="calc-btn" onclick="calculateMargin()">Calculate Margin</button>
  </div>

  <div id="result-container"></div>
  
  <div class="footer-links no-print">
    <button id="btnPrint" style="display: none;" onclick="window.print()">🖨️ Print Report</button>
    <a href="mailto:kishore.kumar.m@live.com?subject=Dealer Margin Calculator">✉️ Report Issue</a>
  </div>
</div>

<script>
const i18n = {
  en: {
    appTitle: "Dealer Margin Calculator",
    appInstruction: "Enter prices to find your base net margin. Optionally, add your previous month's volume to calculate your exact final margin including dynamic incentives.",
    lblPetrol: "🚗 Petrol (MS)",
    lblDiesel: "🚛 Diesel (HSD)",
    lblRsp: "Selling Price (RSP)",
    lblInv: "Invoice Price",
    lblVol: "Prev. Month Vol (KL) <span class='optional-tag'>- Optional</span>",
    btnCalc: "Calculate Margin",
    colDetails: "Breakdown Per Liter",
    colASite: "A-Site",
    colBSite: "B-Site",
    txtGross: "Base Profit (RSP - Inv)",
    txtLfr: "OMC LFR Deduction",
    txtNet: "Base Net Margin",
    txtVdm: "Dynamic Incentive (VDM)",
    txtFinal: "Final Total Margin",
    msgNoVol: "Volume not provided. Showing base net margin.",
    msgVol: "Dynamic VDM included based on combined volume of",
    lblSlabTitle: "Reference: Additional Margin Slabs (If volume not entered)",
    lblSlabVol: "Combined Volume (KL)",
    lblSlabMs: "MS Bonus / Liter",
    lblSlabHsd: "HSD Bonus / Liter"
  },
  te: {
    appTitle: "డీలర్ మార్జిన్ కాలిక్యులేటర్",
    appInstruction: "మీ నెట్ మార్జిన్ తెలుసుకోవడానికి ధరలను నమోదు చేయండి. డైనమిక్ ఇన్సెంటివ్‌లతో సహా మీ ఖచ్చితమైన తుది మార్జిన్‌ను లెక్కించడానికి, గత నెల వాల్యూమ్‌ను కూడా నమోదు చేయండి (ఇది ఐచ్ఛికం).",
    lblPetrol: "🚗 పెట్రోల్ (MS)",
    lblDiesel: "🚛 డీజిల్ (HSD)",
    lblRsp: "అమ్మకపు ధర (RSP)",
    lblInv: "ఇన్వాయిస్ ధర",
    lblVol: "గత నెల వాల్యూమ్ (KL) <span class='optional-tag'>- ఐచ్ఛికం</span>",
    btnCalc: "మార్జిన్ లెక్కించు",
    colDetails: "లీటరుకు వివరాలు",
    colASite: "A-సైట్",
    colBSite: "B-సైట్",
    txtGross: "సాధారణ లాభం (RSP - Inv)",
    txtLfr: "LFR తగ్గింపు",
    txtNet: "బేస్ నెట్ మార్జిన్",
    txtVdm: "డైనమిక్ ఇన్సెంటివ్ (VDM)",
    txtFinal: "తుది మార్జిన్",
    msgNoVol: "వాల్యూమ్ ఇవ్వబడలేదు. బేస్ నెట్ మార్జిన్ మాత్రమే చూపబడింది.",
    msgVol: "మొత్తం వాల్యూమ్ ఆధారంగా డైనమిక్ VDM జోడించబడింది:",
    lblSlabTitle: "రిఫరెన్స్: అదనపు మార్జిన్ స్లాబ్‌లు",
    lblSlabVol: "మొత్తం వాల్యూమ్ (KL)",
    lblSlabMs: "MS బోనస్ / లీటరుకు",
    lblSlabHsd: "HSD బోనస్ / లీటరుకు"
  }
};

let currentLang = 'en';

function switchLanguage() {
  currentLang = currentLang === 'en' ? 'te' : 'en';
  const t = i18n[currentLang];
  
  document.getElementById('langToggle').innerText = currentLang === 'en' ? 'తెలుగు' : 'English';
  document.getElementById('appTitle').innerText = t.appTitle;
  document.getElementById('appInstruction').innerText = t.appInstruction;
  document.getElementById('lblPetrol').innerText = t.lblPetrol;
  document.getElementById('lblDiesel').innerText = t.lblDiesel;
  
  document.querySelectorAll('#lblMsRsp, #lblHsdRsp').forEach(el => el.innerHTML = t.lblRsp);
  document.querySelectorAll('#lblMsInv, #lblHsdInv').forEach(el => el.innerHTML = t.lblInv);
  document.querySelectorAll('#lblMsVol, #lblHsdVol').forEach(el => el.innerHTML = t.lblVol);
  
  document.getElementById('btnCalculate').innerText = t.btnCalc;
  
  if (document.getElementById("result-container").innerHTML !== "") {
    calculateMargin();
  }
}

function calculateMargin() {
  let msRsp = parseFloat(document.getElementById('msRsp').value) || 0;
  let msInv = parseFloat(document.getElementById('msInvoice').value) || 0;
  let msVol = parseFloat(document.getElementById('msVol').value) || 0;
  
  let hsdRsp = parseFloat(document.getElementById('hsdRsp').value) || 0;
  let hsdInv = parseFloat(document.getElementById('hsdInvoice').value) || 0;
  let hsdVol = parseFloat(document.getElementById('hsdVol').value) || 0;

  let totalVol = msVol + hsdVol;
  let hasVolume = totalVol > 0;

  const lfrA_ms = (443.50 * 1.18) / 1000;
  const lfrA_hsd = (369.58 * 1.18) / 1000;
  const lfrB_ms = (235.96 * 1.28) / 1000;
  const lfrB_hsd = (196.65 * 1.28) / 1000;

  let diffMs = msRsp - msInv;
  let diffHsd = hsdRsp - hsdInv;

  let vdm_ms = 0;
  let vdm_hsd = 0;

  if (hasVolume) {
    const baseMS = msVol * 201.76;
    const baseHSD = hsdVol * 149.46;
    const baseTotal = baseMS + baseHSD;
    let totalBR = baseTotal;

    if (totalVol <= 25) totalBR = Math.max(12000, baseTotal);
    else if (totalVol <= 50) totalBR = Math.max(20000, baseTotal);
    else if (totalVol <= 100) totalBR = Math.max(24000, baseTotal);
    else if (totalVol <= 150) totalBR = Math.max(26000, baseTotal);
    else if (totalVol <= 170) totalBR = Math.max(27500, baseTotal);

    let br_ms = baseTotal > 0 ? (totalBR * (baseMS / baseTotal)) : 0;
    let br_hsd = baseTotal > 0 ? (totalBR * (baseHSD / baseTotal)) : 0;

    let slab_ms = 0, slab_hsd = 0;
    const slabs = [
      { limit: 400, ms: 379.67, hsd: 281.23 }, { limit: 600, ms: 340.19, hsd: 251.99 },
      { limit: 800, ms: 300.72, hsd: 222.75 }, { limit: 1000, ms: 261.24, hsd: 193.51 },
      { limit: 1200, ms: 221.77, hsd: 164.27 }, { limit: 1400, ms: 182.29, hsd: 135.03 },
      { limit: 1600, ms: 142.82, hsd: 105.79 }, { limit: 1800, ms: 103.34, hsd: 76.55 },
      { limit: 2000, ms: 78.95, hsd: 58.48 }, { limit: 2200, ms: 52.63, hsd: 38.99 },
      { limit: 2400, ms: 39.47, hsd: 29.24 }, { limit: 2600, ms: 26.32, hsd: 19.49 },
      { limit: 2800, ms: 13.16, hsd: 9.75 }, { limit: Infinity, ms: 0, hsd: 0 }
    ];

    for (let slab of slabs) {
      if (totalVol <= slab.limit) { slab_ms = slab.ms; slab_hsd = slab.hsd; break; }
    }

    if (msVol > 0) vdm_ms = (br_ms + (msVol * slab_ms)) / (msVol * 1000);
    if (hsdVol > 0) vdm_hsd = (br_hsd + (hsdVol * slab_hsd)) / (hsdVol * 1000);
  }

  function fmt(num) {
    return (num < 0 ? "-" : "") + "₹" + Math.abs(num).toFixed(4);
  }

  const t = i18n[currentLang];
  const volMsg = hasVolume ? `${t.msgVol} <b>${totalVol} KL</b>` : t.msgNoVol;

  let html = `<div class="card result-wrapper">
    <p style="text-align: center; font-size: 13px; color: var(--text-muted); margin-top: 0;">${volMsg}</p>
    <table>
      <tr>
        <th>${t.colDetails}</th>
        <th style="color: #0056b3;" class="site-a-col">${t.colASite}</th>
        <th style="color: #2d7a17;" class="site-b-col">${t.colBSite}</th>
      </tr>`;

  // MS Rows
  html += `<tr><td colspan="3" style="background: #fafafa; text-align: center; font-weight: 700;">🚗 MS (Petrol)</td></tr>`;
  html += `<tr><td class="row-title">${t.txtGross}</td><td>${fmt(diffMs)}</td><td>${fmt(diffMs)}</td></tr>`;
  html += `<tr><td class="row-title text-danger">${t.txtLfr}</td><td class="text-danger">-${fmt(lfrA_ms).replace('-','')}</td><td class="text-danger">-${fmt(lfrB_ms).replace('-','')}</td></tr>`;
  html += `<tr><td class="row-title">${t.txtNet}</td><td style="font-weight: 600;">${fmt(diffMs - lfrA_ms)}</td><td style="font-weight: 600;">${fmt(diffMs - lfrB_ms)}</td></tr>`;
  
  if (hasVolume) {
    html += `<tr><td class="row-title text-success">${t.txtVdm}</td><td class="text-success">+${fmt(vdm_ms).replace('-','')}</td><td class="text-success">+${fmt(vdm_ms).replace('-','')}</td></tr>`;
    html += `<tr class="final-row"><td class="row-title">${t.txtFinal}</td><td style="color: #0056b3;">${fmt(diffMs - lfrA_ms + vdm_ms)}</td><td style="color: #2d7a17;">${fmt(diffMs - lfrB_ms + vdm_ms)}</td></tr>`;
  }

  // HSD Rows
  html += `<tr><td colspan="3" style="background: #fafafa; text-align: center; font-weight: 700; border-top: 4px solid var(--bg-main);">🚛 HSD (Diesel)</td></tr>`;
  html += `<tr><td class="row-title">${t.txtGross}</td><td>${fmt(diffHsd)}</td><td>${fmt(diffHsd)}</td></tr>`;
  html += `<tr><td class="row-title text-danger">${t.txtLfr}</td><td class="text-danger">-${fmt(lfrA_hsd).replace('-','')}</td><td class="text-danger">-${fmt(lfrB_hsd).replace('-','')}</td></tr>`;
  html += `<tr><td class="row-title">${t.txtNet}</td><td style="font-weight: 600;">${fmt(diffHsd - lfrA_hsd)}</td><td style="font-weight: 600;">${fmt(diffHsd - lfrB_hsd)}</td></tr>`;
  
  if (hasVolume) {
    html += `<tr><td class="row-title text-success">${t.txtVdm}</td><td class="text-success">+${fmt(vdm_hsd).replace('-','')}</td><td class="text-success">+${fmt(vdm_hsd).replace('-','')}</td></tr>`;
    html += `<tr class="final-row"><td class="row-title">${t.txtFinal}</td><td style="color: #0056b3;">${fmt(diffHsd - lfrA_hsd + vdm_hsd)}</td><td style="color: #2d7a17;">${fmt(diffHsd - lfrB_hsd + vdm_hsd)}</td></tr>`;
  }
  
  html += `</table></div>`;

  // Static Slabs Table (Shows only if volume is omitted)
  if (!hasVolume) {
    html += `<div class="card slab-table no-print">
      <div class="section-title">${t.lblSlabTitle}</div>
      <table>
        <tr><th>${t.lblSlabVol}</th><th style="text-align: center;">${t.lblSlabMs}</th><th style="text-align: center;">${t.lblSlabHsd}</th></tr>
        <tr><td>Up to 400 KL</td><td style="text-align: center;">₹0.3796</td><td style="text-align: center;">₹0.2812</td></tr>
        <tr><td>401 to 600 KL</td><td style="text-align: center;">₹0.3401</td><td style="text-align: center;">₹0.2519</td></tr>
        <tr><td>601 to 800 KL</td><td style="text-align: center;">₹0.3007</td><td style="text-align: center;">₹0.2227</td></tr>
        <tr><td>801 to 1000 KL</td><td style="text-align: center;">₹0.2612</td><td style="text-align: center;">₹0.1935</td></tr>
        <tr><td>1001 to 1200 KL</td><td style="text-align: center;">₹0.2217</td><td style="text-align: center;">₹0.1642</td></tr>
        <tr><td>1201 to 1400 KL</td><td style="text-align: center;">₹0.1822</td><td style="text-align: center;">₹0.1350</td></tr>
      </table>
      <p style="font-size: 11px; color: var(--text-muted); margin-top: 10px; text-align: center;">Note: Base Business Return lump sums also apply depending on volume.</p>
    </div>`;
  }

  document.getElementById("result-container").innerHTML = html;
  document.getElementById("btnPrint").style.display = "inline-block";
}
</script>

</body>
</html>
